name: Demostración de un pipelinede GithubActions

on:
  push:
    branches:
      - main
      - develop

jobs:
  saludo:
    runs-on: ubuntu-latest

    env:
      NOMBRE: Ian Tapia

    steps:
      - name: Saludo desde main
        if: github.ref == 'refs/heads/main'
        run: echo "Hola desde main, mi nombre es $NOMBRE"

      - name: Saludo desde develop
        if: github.ref == 'refs/heads/develop' 
        run: echo "Hola desde develop, mi nombre es $NOMBRE"
